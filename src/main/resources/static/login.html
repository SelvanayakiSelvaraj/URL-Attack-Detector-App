<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - URL Attack Detector</title>
    <!-- Modern Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-container {
            max-width: 500px;
            margin: auto;
            width: 100%;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: none;
            overflow: hidden;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #4facfe;
        }

        .btn-custom {
            background: #2a5298;
            color: white;
            font-weight: 600;
            padding: 12px 30px;
            transition: all 0.3s;
            width: 100%;
            border: none;
        }

        .btn-custom:hover {
            background: #1e3c72;
            color: white;
            transform: translateY(-1px);
        }

        .nav-pills .nav-link {
            color: #495057;
            font-weight: 600;
        }

        .nav-pills .nav-link.active {
            background-color: #2a5298;
            color: white;
        }

        .form-control:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 0.25rem rgba(42, 82, 152, 0.25);
        }
    </style>
</head>

<body>
    <div class="container auth-container">
        <div class="auth-card">
            <!-- Header Section -->
            <div class="card-header-custom shadow-sm">
                <i class="fas fa-shield-alt header-icon"></i>
                <h3 class="fw-bold mb-1">URL Attack Detector</h3>
                <p class="mb-0 opacity-75">Secure Your Web Browsing</p>
            </div>

            <!-- Body Section -->
            <div class="p-4 p-md-5">
                <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill"
                            data-bs-target="#pills-login" type="button" role="tab" aria-controls="pills-login"
                            aria-selected="true">Login</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill"
                            data-bs-target="#pills-register" type="button" role="tab" aria-controls="pills-register"
                            aria-selected="false">Sign Up</button>
                    </li>
                </ul>
                <div class="tab-content" id="pills-tabContent">
                    <!-- Login Form -->
                    <div class="tab-pane fade show active" id="pills-login" role="tabpanel"
                        aria-labelledby="pills-login-tab">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control" id="loginUsername" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control" id="loginPassword" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-custom">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </button>
                        </form>
                    </div>

                    <!-- Register Form -->
                    <div class="tab-pane fade" id="pills-register" role="tabpanel"
                        aria-labelledby="pills-register-tab">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Choose Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user-plus text-muted"></i></span>
                                    <input type="text" class="form-control" id="registerUsername" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Choose Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-key text-muted"></i></span>
                                    <input type="password" class="form-control" id="registerPassword" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-custom">
                                <i class="fas fa-user-check me-2"></i>Create Account
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS for Tabs -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Redirect to index if already logged in
        if (localStorage.getItem('userId')) {
            window.location.href = '/index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('https://url-attack-detector-web.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('username', data.username);
                    window.location.href = '/index.html';
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (err) {
                alert('Connection error. Is the server running?');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch('https://url-attack-detector-web.onrender.com/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Registration successful! Please login.');
                    // Switch to login tab safely using native click to trigger Bootstrap's internal listeners correctly
                    document.querySelector('#pills-login-tab').click();
                    
                    // Auto-fill username
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('registerUsername').value = '';
                    document.getElementById('registerPassword').value = '';
                    
                    // Focus the password field after transition
                    setTimeout(() => {
                        document.getElementById('loginPassword').focus();
                    }, 300);
                } else {
                    alert(data.message || 'Registration failed');
                }
            } catch (err) {
                alert('Connection error. Is the server running?');
            }
        });
    </script>
</body>

</html>
