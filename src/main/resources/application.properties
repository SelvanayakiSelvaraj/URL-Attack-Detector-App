spring.application.name=url-attack-detector
server.port=8080
ml.api.url=http://127.0.0.1:5000/predict

# Embedded Database Configuration (H2 File Database)
spring.datasource.url=jdbc:h2:file:./data/url_detector_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate Configuration (Auto-creates tables)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
