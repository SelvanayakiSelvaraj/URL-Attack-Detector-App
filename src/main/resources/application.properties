spring.application.name=url-attack-detector
server.port=${PORT:8080}
ml.api.url=${ML_API_URL:http://127.0.0.1:5000/predict}

# Database Configuration
# Uses PostgreSQL on Render (via environment variables), falls back to H2 locally
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/url_detector_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# Hibernate Configuration (Auto-creates tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# PostgreSQL Dialect (auto-detected, but can be overridden)
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 Console (only works locally)
spring.h2.console.enabled=false
