<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URL Attack Detector - Mobile App</title>
    <!-- Use Tailwind CSS for a modern, sleek mobile-first design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        .slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- App Header -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white p-5 shadow-md flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <i class="fas fa-shield-alt text-2xl text-blue-200"></i>
            <div>
                <h1 class="text-xl font-bold leading-tight">URL Security</h1>
                <p class="text-xs text-blue-200">AI Threat Scanner</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-5 flex flex-col items-center">
        
        <div class="w-full max-w-md bg-white rounded-2xl shadow-sm p-6 mb-6">
            <label class="block text-gray-700 font-semibold mb-2 text-sm uppercase tracking-wide">Enter Target URL</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fas fa-link text-gray-400"></i>
                </div>
                <input type="url" id="urlInput" 
                    class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all shadow-inner outline-none" 
                    placeholder="https://example.com" required>
            </div>
            
            <button id="analyzeBtn" onclick="analyzeUrl()" 
                class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 flex justify-center items-center">
                <i class="fas fa-search me-2"></i> Analyze URL
            </button>
            
            <div id="errorMsg" class="hidden mt-3 text-red-600 text-sm flex items-center bg-red-50 p-3 rounded-lg border border-red-100">
                <i class="fas fa-exclamation-circle mr-2"></i> <span id="errorText"></span>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden flex-col items-center justify-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-3"></div>
            <p class="text-gray-500 font-medium animate-pulse">Scanning URL...</p>
        </div>

        <!-- Results Card -->
        <div id="resultCard" class="hidden w-full max-w-md bg-white rounded-2xl shadow-lg overflow-hidden slide-up">
            <div id="resultHeader" class="p-5 text-center text-white">
                <i id="resultIcon" class="fas fa-shield-check text-4xl mb-2"></i>
                <h2 id="predictionText" class="text-2xl font-bold">Safe</h2>
            </div>
            
            <div class="p-5 divide-y divide-gray-100">
                <div class="py-3 flex justify-between items-center">
                    <span class="text-gray-500 font-medium"><i class="fas fa-server w-5 text-center mr-2"></i>Source IP</span>
                    <span id="sourceIp" class="font-bold text-gray-800 tracking-wide font-mono">192.168.1.1</span>
                </div>
                
                <div id="attackTypeRow" class="py-3 flex justify-between items-center">
                    <span class="text-gray-500 font-medium"><i class="fas fa-bug w-5 text-center mr-2"></i>Attack Type</span>
                    <span id="attackType" class="font-bold text-red-600">SQL Injection</span>
                </div>
                
                <div id="riskLevelRow" class="py-3 flex justify-between items-center">
                    <span class="text-gray-500 font-medium"><i class="fas fa-exclamation-triangle w-5 text-center mr-2"></i>Risk Level</span>
                    <span id="riskLevel" class="px-3 py-1 bg-red-100 text-red-700 rounded-full font-bold text-sm border border-red-200">High</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function analyzeUrl() {
            const urlInput = document.getElementById('urlInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const resultCard = document.getElementById('resultCard');
            const loading = document.getElementById('loading');
            const analyzeBtn = document.getElementById('analyzeBtn');

            // 1. Validation
            if (!urlInput) {
                showError("Please enter a valid URL to analyze.");
                return;
            }

            // Reset UI State
            errorMsg.classList.add('hidden');
            resultCard.classList.add('hidden');
            loading.classList.remove('hidden');
            analyzeBtn.disabled = true;
            analyzeBtn.classList.add('opacity-75');

            try {
                // 2. Fetch API Call to backend (Replace localhost if deploying on actual device)
                // Note: Android Emulator uses 10.0.2.2 instead of localhost for local backend access
                const BACKEND_URL = "http://localhost:8080/analyze-url";
                
                const response = await fetch(`${BACKEND_URL}?url=${encodeURIComponent(urlInput)}`);
                
                if (!response.ok) {
                    throw new Error("Server not available or returned an error.");
                }

                const data = await response.json();

                // 3. Process and Display Response
                renderResults(data);

            } catch (error) {
                console.error("API Error:", error);
                // 4. Handle Server Unreachable Error
                showError(error.message === "Failed to fetch" ? "Server not available. Please check backend connection." : error.message);
            } finally {
                loading.classList.add('hidden');
                analyzeBtn.disabled = false;
                analyzeBtn.classList.remove('opacity-75');
            }
        }

        function renderResults(data) {
            document.getElementById('resultCard').classList.remove('hidden');
            
            const isMalicious = data.prediction === "Malicious";
            const header = document.getElementById('resultHeader');
            const resultIcon = document.getElementById('resultIcon');
            
            // Map backend 'ip_address' to 'Source IP' UI requirement
            document.getElementById('sourceIp').textContent = data.ip_address || 'Unknown';
            document.getElementById('predictionText').textContent = data.prediction;

            if (isMalicious) {
                // Malicious Styling
                header.className = "p-5 text-center text-white bg-gradient-to-br from-red-500 to-red-700";
                resultIcon.className = "fas fa-skull-crossbones text-5xl mb-2 animate-bounce";
                
                document.getElementById('attackTypeRow').classList.remove('hidden');
                document.getElementById('riskLevelRow').classList.remove('hidden');
                
                document.getElementById('attackType').textContent = data.attack_type || 'Unknown';
                
                const rLevel = data.risk_level || 'High';
                const riskBadge = document.getElementById('riskLevel');
                riskBadge.textContent = rLevel;
                riskBadge.className = rLevel === 'High' ? 
                    "px-3 py-1 bg-red-100 text-red-700 rounded-full font-bold text-sm border border-red-200" : 
                    "px-3 py-1 bg-orange-100 text-orange-700 rounded-full font-bold text-sm border border-orange-200";

            } else {
                // Safe Styling
                header.className = "p-5 text-center text-white bg-gradient-to-br from-emerald-400 to-green-600";
                resultIcon.className = "fas fa-shield-check text-5xl mb-2";
                
                document.getElementById('attackTypeRow').classList.add('hidden');
                document.getElementById('riskLevelRow').classList.add('hidden');
            }
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            document.getElementById('errorText').textContent = message;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body>
</html>
